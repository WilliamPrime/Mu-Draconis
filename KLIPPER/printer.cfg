# This file is an example config file for polar style printers. One
# may copy and edit this file to configure a new polar printer.

# POLAR KINEMATICS ARE A WORK IN PROGRESS. Moves around the 0, 0
# position are known to not work properly.

# See docs/Config_Reference.md for a description of parameters.
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_4200090007504E5238363120-if00

[mcu mini]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_060011001943304846333520-if00

#[mcu mini]
#serial:

[virtual_sdcard]
path: ~/printer_data/gcodes
#on_error_gcode:
#   A list of G-Code commands to execute when an error is reported.
#   See docs/Command_Templates.md for G-Code format. The default is to
#   run TURN_OFF_HEATERS.

[display_status]

[temperature_fan theta_fan]
pin:PB15
#max_power:
#shutdown_speed:5
#cycle_time:5
#hardware_pwm:
#kick_start_time:
#off_below:
#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#enable_pin: pb15
#   See the "fan" section for a description of the above parameters.
sensor_type:Generic 3950
sensor_pin: mini:PA6
control:watermark
#max_delta:
min_temp:0
max_temp:60
#   See the "extruder" section for a description of the above parameters.
#pid_Kp:
#pid_Ki:
#pid_Kd:
#   The proportional (pid_Kp), integral (pid_Ki), and derivative
#   (pid_Kd) settings for the PID feedback control system. Klipper
#   evaluates the PID settings with the following general formula:
#     fan_pwm = max_power - (Kp*e + Ki*integral(e) - Kd*derivative(e)) / 255
#   Where "e" is "target_temperature - measured_temperature" and
#   "fan_pwm" is the requested fan rate with 0.0 being full off and
#   1.0 being full on. The pid_Kp, pid_Ki, and pid_Kd parameters must
#   be provided when the PID control algorithm is enabled.
#pid_deriv_time: 2.0
#   A time value (in seconds) over which temperature measurements will
#   be smoothed when using the PID control algorithm. This may reduce
#   the impact of measurement noise. The default is 2 seconds.
target_temp: 30
#   A temperature (in Celsius) that will be the target temperature.
#   The default is 40 degrees.
#max_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when the sensor temperature exceeds the set value.
#   The default is 1.0.
min_speed: 1
#   The minimum fan speed (expressed as a value from 0.0 to 1.0) that
#   the fan will be set to for PID temperature fans.
#   The default is 0.3.

[force_move] 
enable_force_move: true 

#####################################################################
#      Bed Stepper Settings
#####################################################################

[stepper_bed]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
gear_ratio: 100:20

[tmc2209 stepper_bed]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
interpolate: False
run_current: 1.2
sense_resistor: 0.110
stealthchop_threshold: 0                                            # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle
diag_pin: ^PC1                                                      # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 110                                                  # 255 is most sensitive value, 0 is least sensitive




#####################################################################
#      Arm Stepper Settings
#####################################################################

[stepper_arm]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: PC0
position_endstop: 0
position_min: 0
position_max: 110
homing_speed: 10

[tmc2209 stepper_arm]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
interpolate: False
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0                                            # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle
diag_pin: ^PC0                                                      # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 110                                                  # 255 is most sensitive value, 0 is least sensitive


#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB0
dir_pin: !PC5                                                       # Remove the ! before PC5 if motor direction is inverted.
enable_pin: !PB1
rotation_distance: 40                                               
microsteps: 32
endstop_pin: PC2
position_endstop: 0
homing_positive_dir: false
position_max: 185
position_min: -3
homing_speed: 10
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
interpolate: False
run_current: 1.2                                                
sense_resistor: 0.110
stealthchop_threshold: 0                                            # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle


#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 4.57
filament_diameter: 1.75
nozzle_diameter:0.4
heater_pin: PC9
sensor_type: Generic 3950
sensor_pin: PC4
max_extrude_only_distance:102
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 250

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
interpolate: False
run_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0   

[heater_bed]
heater_pin: PC8
sensor_type: Generic 3950
sensor_pin: PA0
#control: pid
max_power: 0.25
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 80


[heater_fan heatbreak_cooling_fan]
pin:PC6
off_below:0.3
heater: extruder
#   Name of the config section defining the heater that this fan is
#   associated with. If a comma separated list of heater names is
#   provided here, then the fan will be enabled when any of the given
#   heaters are enabled. The default is "extruder".
heater_temp: 50.0
#   A temperature (in Celsius) that the heater must drop below before
#   the fan is disabled. The default is 50 Celsius.
fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when its associated heater is enabled. The default
#   is 1.0
[fan]
pin: PC7
off_below:0.35


#[bed_screws]
#screw1: 13,38
#screw1_name: front left screw
#screw2: 268,38
#screw2_name: front right screw
#screw3: 268,278
#screw3_name: rear right screw
#screw4: 13,38
#screw4_name: rear left screw
#horizontal_move_z: 5



[printer]
kinematics: polar
max_velocity: 120
max_accel: 2000
max_z_velocity: 25
max_z_accel: 30

[homing_override]
gcode:
#   A list of G-Code commands to execute in place of G28 commands
#   found in the normal g-code input. See docs/Command_Templates.md
#   for G-Code format. If a G28 is contained in this list of commands
#   then it will invoke the normal homing procedure for the printer.
#   The commands listed here must home all axes. This parameter must
#   be provided.
  SET_KINEMATIC_POSITION Z=-0.6 #tempoary because missing end stop
  G1 Z4 # temporary because of missing end stop
  G28 X
  #G28 Z
  #G1 Z4
  G1 X40
  G1 Y5

  
set_position_y:0
  
axes: y
#   The axes to override. For example, if this is set to "z" then the
#   override script will only be run when the z axis is homed (eg, via
#   a "G28" or "G28 Z0" command). Note, the override script should
#   still home all axes. The default is "xyz" which causes the
#   override script to be run in place of all G28 commands.
  set_position_y:0
    


#   If specified, the printer will assume the axis is at the specified
#   position prior to running the above g-code commands. Setting this
#   disables homing checks for that axis. This may be useful if the
#   head must move prior to invoking the normal G28 mechanism for an
#   axis. The default is to not force a position for an axis.

#macros
[include mainsail.cfg]

